<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coba Elemen Form</title>
</head>
<body>
  <h1>Contoh elemen-elemen form pada HTML</h1>
  <form>
    <label for="nama">Nama: 
      <input type="text" id="nama" name="nama" placeholder="Masukkan nama">
    </label>
    <br>

    <label for="password">Password: 
      <input type="password" id="password" name="password" placeholder="Masukkan password">
    </label>
    <br>

    <label for="email">Email:
      <input type="email" name="email" id="email" placeholder="Masukkan Email">
    </label>
    <br>

    <label for="angka">Angka:
      <input type="number" name="number" id="angka" min="0" max="50" step="5">
    </label>
    <br>

    <label for="tanggal">Tanggal:
      <input type="date" name="date" id="tanggal">
    </label>
    <br>

    <label for="warna">Warna:
      <input type="color" name="color" id="warna">
    </label>
    <br>

    <button type="submit">Kirim</button>
  </form>
</body>
</html>
